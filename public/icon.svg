<svg width="128" height="128" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#0091EA"/>
    </linearGradient>
  </defs>

  <!-- Outer circular connection -->
  <circle cx="32" cy="32" r="28" stroke="url(#grad)" stroke-width="3" fill="none"/>

  <!-- Connection nodes -->
  <circle cx="32" cy="10" r="3" fill="#00C853"/>
  <circle cx="52" cy="32" r="3" fill="#0091EA"/>
  <circle cx="32" cy="54" r="3" fill="#00C853"/>
  <circle cx="12" cy="32" r="3" fill="#0091EA"/>

  <!-- Connecting lines -->
  <line x1="32" y1="10" x2="52" y2="32" stroke="#00C853" stroke-width="2"/>
  <line x1="52" y1="32" x2="32" y2="54" stroke="#0091EA" stroke-width="2"/>
  <line x1="32" y1="54" x2="12" y2="32" stroke="#00C853" stroke-width="2"/>
  <line x1="12" y1="32" x2="32" y2="10" stroke="#0091EA" stroke-width="2"/>

  <!-- Plastic bottle (center symbol) -->
  <path d="M28 20 L36 20 L38 26 L38 42 Q38 46 32 46 Q26 46 26 42 L26 26 Z"
        fill="url(#grad)" />

  <!-- Bottle cap -->
  <rect x="29" y="16" width="6" height="4" rx="1" fill="#0091EA"/>
</svg>